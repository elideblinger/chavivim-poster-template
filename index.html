<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chavivim Posters">
<title>Chavivim Posters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --ink:#333333; --yellow:#f2a72e; }
  * { box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #1c1c1c;
    color: #fff;
    margin: 0;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 20px; letter-spacing: 0.5px; }
  .panel {
    background: #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }
  label { display:block; font-size: 13px; font-weight:700; margin-bottom:6px; color:#ccc; }
  input[type=text] {
    width:100%; padding:10px 12px; border-radius:8px; border:none;
    margin-bottom:14px; font-family:'Poppins',sans-serif; font-weight:700;
    font-size:16px; color:#333;
  }
  input[type=file] { margin-bottom: 14px; }
  button {
    font-family:'Poppins',sans-serif; font-weight:800; font-size:15px;
    background: var(--yellow); color:#222; border:none; border-radius:10px;
    padding:12px 20px; cursor:pointer; width:100%;
  }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  .modeRow { display:flex; gap:10px; margin-bottom:16px; }
  .modeRow button { background:#3a3a3a; color:#ccc; }
  .modeRow button.active { background: var(--yellow); color:#222; }
  #photoPreviewWrap, #videoPreviewWrap {
    width: 100%;
    max-width: 340px;
    margin: 0 auto 14px;
    border-radius: 12px;
    overflow: hidden;
    background:#111;
    text-align:center;
  }
  #photoPreviewWrap img, #videoPreviewWrap video { display:block; width:100%; height:auto; }
  #livePreviewCanvas { display:block; width:100%; height:auto; }
  .hint { font-size:12px; color:#999; text-align:center; margin:-6px 0 14px; }
  .chipsWrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .chip {
    display:flex; align-items:center; gap:6px; background:#3a3a3a; color:#fff;
    border-radius:16px; padding:5px 8px 5px 12px; font-size:13px; font-weight:700;
  }
  .chip button {
    width:16px; height:16px; padding:0; border-radius:50%; background:#666; color:#fff;
    font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .backBtn { background:#444 !important; color:#fff !important; margin-top:8px; }
  #createBtnLabel {
    display: block;
    font-family:'Poppins',sans-serif; font-weight:800; font-size:15px;
    background: var(--yellow); color:#222; border:none; border-radius:10px;
    padding:12px 20px; cursor:pointer; width:100%; text-align:center;
    box-sizing: border-box;
  }
  #resultWrap { text-align:center; }
  #resultCanvas, #resultVideo { max-width:100%; border-radius:0; box-shadow:0 4px 20px rgba(0,0,0,.5); }
  a.download {
    display:inline-block; margin-top:14px; background:var(--yellow); color:#222;
    text-decoration:none; font-weight:800; padding:12px 22px; border-radius:10px;
  }
  .step { display:none; }
  .step.active { display:block; }
  #progressWrap { display:none; text-align:center; padding:20px 0; }
  #progressWrap.active { display:block; }
  #progressBarOuter { background:#111; border-radius:8px; height:14px; overflow:hidden; margin-top:10px; }
  #progressBarInner { background: var(--yellow); height:100%; width:0%; transition: width .2s; }
  #progressLabel { font-size:13px; color:#ccc; margin-top:8px; }
</style>
</head>
<body>

<h1>CHAVIVIM POSTERS</h1>

<div class="panel step active" id="step1">
  <label for="mediaInput" id="createBtnLabel">Create</label>
  <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none;">
</div>

<div class="panel step" id="step2">
  <div id="photoPreviewWrap" style="display:none;">
    <canvas id="livePreviewCanvas"></canvas>
  </div>
  <div id="videoPreviewWrap" style="display:none;">
    <video id="videoPreviewEl" src="" muted playsinline controls></video>
  </div>
  <p class="hint" id="videoHint" style="display:none;">the final border/logo/text only appear after you hit Create</p>
  <p class="hint">the border adapts to fit your photo/video -- nothing gets cropped</p>

  <label>Location</label>
  <input type="text" id="locationInput">

  <label>Condition</label>
  <input type="text" id="conditionInput">

  <label>Units</label>
  <div id="unitsChips" class="chipsWrap"></div>
  <input type="text" id="unitsInput" placeholder="type a unit, press Enter">

  <label>Header line (right side, above units)</label>
  <input type="text" id="headerInput" value="Great job all units">

  <button type="button" id="createBtn">Create</button>
  <button type="button" id="backBtn2" class="backBtn">Back</button>

  <div id="progressWrap">
    <div id="progressLabel">Processing video on your phone...</div>
    <div id="progressBarOuter"><div id="progressBarInner"></div></div>
  </div>
</div>

<div class="panel step" id="step3">
  <div id="resultWrap">
    <canvas id="resultCanvas" width="2193" height="3072" style="display:none;"></canvas>
    <video id="resultVideo" controls playsinline style="display:none;"></video>
    <br>
    <button type="button" id="saveBtn" class="download" style="border:none;">Save</button><br><br>
    <button type="button" id="backBtn" style="background:#444;color:#fff;">Edit again</button><br><br>
    <button type="button" id="newBtn" style="background:#444;color:#fff;">Create New</button>
  </div>
</div>

<script src="ffmpeg.js"></script>
<script src="index.js"></script>

const SCALE = 3; // render at 3x for a sharp final image
const BORDER = 26*SCALE;      // border thickness on top/left/right
const BOTTOM_STRIP = 111*SCALE; // space below the photo/video, holds the text
const INNER_W = 678*SCALE;    // fixed inner width -- height adapts to the media's own ratio
const CORNER_R = 34*SCALE;
const BORDER_COLOR = '#F0B02B';
const LOGO_W = 182*SCALE;
const LOGO_RING_CX_IMG = 373.3, LOGO_RING_CY_IMG = 383.5, LOGO_RING_DIAM_IMG = 727.4;

let mode = 'photo'; // 'photo' | 'video'
let photoImg = new Image();
let logoImg = new Image();
logoImg.src = LOGO_SRC;
let videoFile = null;
let videoW = 0, videoH = 0;

// Geometry computed per-media once it's uploaded
let CUTOUT = null;   // { x, y, w, h }
let CANVAS_W = 0, CANVAS_H = 0;
let LOGO_CX = 0, LOGO_CY = 0;

const mediaInput = document.getElementById('mediaInput');
const photoPreviewWrap = document.getElementById('photoPreviewWrap');
const videoPreviewWrap = document.getElementById('videoPreviewWrap');
const videoPreviewEl = document.getElementById('videoPreviewEl');
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const progressWrap = document.getElementById('progressWrap');
const progressBarInner = document.getElementById('progressBarInner');
const progressLabel = document.getElementById('progressLabel');

mediaInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.type.startsWith('video/')) {
    mode = 'video';
    videoFile = file;
    const url = URL.createObjectURL(file);
    videoPreviewEl.src = url;
    videoPreviewEl.onloadedmetadata = () => {
      videoW = videoPreviewEl.videoWidth;
      videoH = videoPreviewEl.videoHeight;
      computeGeometry(videoW, videoH);
      videoPreviewWrap.style.display = '';
      photoPreviewWrap.style.display = 'none';
      document.getElementById('videoHint').style.display = '';
      step1.classList.remove('active');
      step2.classList.add('active');
    };
  } else {
    mode = 'photo';
    loadPhotoFile(file);
  }
});

async function loadPhotoFile(file) {
  try {
    if (window.createImageBitmap) {
      // createImageBitmap decodes off the main thread and correctly applies
      // EXIF orientation -- Image()+blob URL alone is what was producing a
      // black canvas for some camera-roll photos on mobile.
      const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
      const c = document.createElement('canvas');
      c.width = bitmap.width;
      c.height = bitmap.height;
      c.getContext('2d').drawImage(bitmap, 0, 0);
      photoImg = c; // a canvas works as a drawImage source just like an <img>
      showPhotoStep();
      return;
    }
  } catch (err) {
    console.warn('createImageBitmap failed, falling back:', err);
  }
  // fallback for older browsers / if createImageBitmap threw
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => { photoImg = img; showPhotoStep(); };
  img.onerror = () => {
    alert('Could not load that photo -- try a different one.');
  };
  img.src = url;
}

function showPhotoStep() {
  computeGeometry(photoImg.width || photoImg.naturalWidth, photoImg.height || photoImg.naturalHeight);
  photoPreviewWrap.style.display = '';
  videoPreviewWrap.style.display = 'none';
  step1.classList.remove('active');
  step2.classList.add('active');
  renderPhotoFinal(); // live preview IS the real render -- no separate thumbnail path
}

function computeGeometry(w, h) {
  const innerH = INNER_W * (h / w);
  CUTOUT = { x: BORDER, y: BORDER, w: INNER_W, h: innerH };
  CANVAS_W = INNER_W + BORDER*2;
  CANVAS_H = BORDER + innerH + BOTTOM_STRIP;
  LOGO_CX = CANVAS_W/2;
  LOGO_CY = CUTOUT.y + CUTOUT.h; // logo center sits exactly on the photo's bottom edge
}

// -- live preview: re-render on every keystroke --
const liveInputs = ['locationInput','conditionInput','headerInput','unitsInput'].map(id => document.getElementById(id));
let liveTimer = null;
function scheduleLivePreview() {
  clearTimeout(liveTimer);
  liveTimer = setTimeout(() => {
    if (mode === 'photo' && CUTOUT) renderPhotoFinal();
  }, 100);
}
liveInputs.forEach(el => el.addEventListener('input', scheduleLivePreview));


document.getElementById('createBtn').addEventListener('click', async () => {
  if (mode === 'photo') {
    currentCanvas = renderPhotoToCanvas(document.getElementById('resultCanvas'));
    document.getElementById('resultCanvas').style.display = '';
    document.getElementById('resultVideo').style.display = 'none';
    step2.classList.remove('active');
    step3.classList.add('active');
  } else {
    await renderVideoFinal();
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  step3.classList.remove('active');
  step2.classList.add('active');
});

document.getElementById('backBtn2').addEventListener('click', () => {
  step2.classList.remove('active');
  step1.classList.add('active');
});

document.getElementById('newBtn').addEventListener('click', () => {
  step3.classList.remove('active');
  step1.classList.add('active');
  document.getElementById('locationInput').value = '';
  document.getElementById('conditionInput').value = '';
  document.getElementById('headerInput').value = 'Great job all units';
  headerManuallyEdited = false;
  unitsList = [];
  renderUnitsChips();
  mediaInput.value = '';
});

// -- units chip input --
let unitsList = [];
const unitsChipsEl = document.getElementById('unitsChips');
const unitsInputEl = document.getElementById('unitsInput');

function renderUnitsChips() {
  unitsChipsEl.innerHTML = '';
  unitsList.forEach((u, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    const label = document.createElement('span');
    label.textContent = u;
    const rm = document.createElement('button');
    rm.type = 'button';
    rm.textContent = '\u00d7';
    rm.addEventListener('click', () => { unitsList.splice(i,1); renderUnitsChips(); scheduleLivePreview(); });
    chip.appendChild(label);
    chip.appendChild(rm);
    unitsChipsEl.appendChild(chip);
  });
  updateAutoHeader();
}

// Auto-fills the header based on unit count, unless the user has manually
// typed something different into that field themselves.
const headerInputEl = document.getElementById('headerInput');
let headerManuallyEdited = false;
headerInputEl.addEventListener('input', () => { headerManuallyEdited = true; });
function updateAutoHeader() {
  if (headerManuallyEdited) return;
  const n = unitsList.length;
  headerInputEl.value = n === 0 ? 'Great job all units' : (n === 1 ? 'Great job unit' : 'Great job units');
}

unitsInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = unitsInputEl.value.trim();
    if (v) {
      unitsList.push(v);
      renderUnitsChips();
      scheduleLivePreview();
    }
    unitsInputEl.value = '';
    unitsInputEl.focus();
  }
});
function getUnitsText() {
  return unitsList.join(', ');
}
renderUnitsChips(); // set correct empty-state header on load

function drawRoundedRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function fitText(ctx, text, maxWidth, startSize, minSize, weight) {
  let size = startSize;
  while (size > minSize) {
    ctx.font = `${weight} ${size}px Poppins, sans-serif`;
    if (ctx.measureText(text).width <= maxWidth) break;
    size -= 1;
  }
  return size;
}

function drawLogoAndText(ctx) {
  const logoScale = LOGO_W / logoImg.naturalWidth;
  const logoH = logoImg.naturalHeight * logoScale;
  const drawX = LOGO_CX - LOGO_RING_CX_IMG * logoScale;
  const drawY = LOGO_CY - LOGO_RING_CY_IMG * logoScale;
  const ringRadius = (LOGO_RING_DIAM_IMG / 2) * logoScale;

  ctx.beginPath();
  ctx.arc(LOGO_CX, LOGO_CY, ringRadius, 0, Math.PI*2);
  ctx.fillStyle = '#333333';
  ctx.fill();
  ctx.drawImage(logoImg, drawX, drawY, LOGO_W, logoH);

  ctx.fillStyle = '#333333';
  ctx.textBaseline = 'alphabetic';

  const leftX = 45*SCALE;
  const rightX = CUTOUT.x + CUTOUT.w - 14*SCALE;
  const fs = 22*SCALE;
  const minFs = 10*SCALE;
  const lineGap = 30*SCALE; // baseline-to-baseline gap between lines
  const stripTop = CUTOUT.y + CUTOUT.h, stripBottom = CANVAS_H;
  const safeMargin = 10*SCALE;
  const logoLeftEdge = LOGO_CX - ringRadius - safeMargin;
  const logoRightEdge = LOGO_CX + ringRadius + safeMargin;

  const rawMaxHalf = 300*SCALE;
  const leftMaxWidth = Math.max(40*SCALE, Math.min(rawMaxHalf, logoLeftEdge - leftX));
  const rightMaxWidth = Math.max(40*SCALE, Math.min(rawMaxHalf, rightX - logoRightEdge));

  const location = document.getElementById('locationInput').value || '';
  const condition = document.getElementById('conditionInput').value || '';
  const header = document.getElementById('headerInput').value || '';
  const units = getUnitsText();

  // wraps `text` into as many lines as needed (greedy, word-by-word) so each
  // line fits maxWidth -- this is the "add a line if more space is needed"
  // behavior for the units row when it's long.
  function wrapToLines(text, maxWidth, size, weight) {
    ctx.font = `${weight} ${size}px Poppins, sans-serif`;
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width <= maxWidth || !cur) {
        cur = test;
      } else {
        lines.push(cur);
        cur = w;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  // builds the final line list + font size for a column given its two
  // logical rows (some may be empty -- those get skipped, and a single
  // remaining row is centered rather than pinned to the top slot)
  function buildColumnLines(rowA, rowB, maxWidth) {
    const rows = [rowA, rowB].filter(r => r && r.length);
    if (rows.length === 0) return { lines: [], size: fs };

    // fixed size, wrap (not shrink) each row that doesn't fit
    let size = fs;
    let lines = [];
    for (const r of rows) lines.push(...wrapToLines(r, maxWidth, size, 700));

    // only shrink if the wrapped block is too tall to fit the strip at all
    const availH = stripBottom - stripTop;
    while (size > minFs) {
      const ascent = size * 0.72, descent = size * 0.22;
      const blockH = ascent + descent + lineGap * (lines.length - 1);
      if (blockH <= availH) break;
      size -= 1;
      lines = [];
      for (const r of rows) lines.push(...wrapToLines(r, maxWidth, size, 700));
    }
    return { lines, size };
  }

  function drawColumn(x, align, rowA, rowB, maxWidth) {
    const { lines, size } = buildColumnLines(rowA, rowB, maxWidth);
    if (!lines.length) return;
    const ascent = size * 0.72, descent = size * 0.22;
    const blockH = ascent + descent + lineGap * (lines.length - 1);
    const topOfBlock = stripTop + ((stripBottom - stripTop) - blockH) / 2;
    let y = topOfBlock + ascent;
    ctx.font = `700 ${size}px Poppins, sans-serif`;
    ctx.textAlign = align;
    for (const line of lines) {
      ctx.fillText(line, x, y);
      y += lineGap;
    }
  }

  drawColumn(leftX, 'left', location, condition, leftMaxWidth);
  drawColumn(rightX, 'right', header, units, rightMaxWidth);
}

let currentCanvas = null;

function renderPhotoToCanvas(canvas) {
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);

  ctx.fillStyle = BORDER_COLOR;
  ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  ctx.save();
  drawRoundedRectPath(ctx, CUTOUT.x, CUTOUT.y, CUTOUT.w, CUTOUT.h, CORNER_R);
  ctx.clip();
  ctx.drawImage(photoImg, CUTOUT.x, CUTOUT.y, CUTOUT.w, CUTOUT.h);
  ctx.restore();

  drawLogoAndText(ctx);
  return canvas;
}

// used for the live preview while editing (step 2)
function renderPhotoFinal() {
  renderPhotoToCanvas(document.getElementById('livePreviewCanvas'));
}

// Builds the border+hole+logo+text overlay as a transparent PNG, to be
// composited on top of the video by ffmpeg. Only this layer + the raw video
// need to be processed -- ffmpeg pads the video into the yellow frame and
// this overlay is stamped on top, which also rounds off the video's corners.
function buildVideoOverlayCanvas() {
  const c = document.createElement('canvas');
  c.width = CANVAS_W;
  c.height = CANVAS_H;
  const ctx = c.getContext('2d');

  ctx.fillStyle = BORDER_COLOR;
  ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.globalCompositeOperation = 'destination-out';
  drawRoundedRectPath(ctx, CUTOUT.x, CUTOUT.y, CUTOUT.w, CUTOUT.h, CORNER_R);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  drawLogoAndText(ctx);
  return c;
}

async function renderVideoFinal() {
  if (!videoFile) return;
  progressWrap.classList.add('active');
  document.getElementById('createBtn').disabled = true;
  progressLabel.textContent = 'Loading video engine...';
  progressBarInner.style.width = '5%';

  try {
    const { FFmpeg } = FFmpegWASM;
    const { fetchFile, toBlobURL } = FFmpegUtil;
    const ffmpeg = new FFmpeg();
    ffmpeg.on('log', ({ message }) => { console.log('[ffmpeg]', message); });
    ffmpeg.on('progress', ({ progress }) => {
      const pct = Math.min(99, Math.round(progress * 100));
      progressBarInner.style.width = pct + '%';
      progressLabel.textContent = `Processing on your phone... ${pct}%`;
    });

    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
    progressLabel.textContent = 'Downloading video engine (~31MB, first time only)...';
    progressBarInner.style.width = '2%';
    const coreURL = await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript');
    progressBarInner.style.width = '10%';
    progressLabel.textContent = 'Downloading video engine (~31MB, first time only)... almost there';
    const wasmURL = await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm');
    progressBarInner.style.width = '25%';
    progressLabel.textContent = 'Starting engine...';
    const loadPromise = ffmpeg.load({ coreURL, wasmURL });
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('Engine start timed out -- this usually means iOS Safari is blocking the background worker (a known Safari limitation, not specific to this video).')), 20000)
    );
    await Promise.race([loadPromise, timeoutPromise]);
    progressBarInner.style.width = '30%';

    progressLabel.textContent = 'Preparing overlay...';
    const overlayCanvas = buildVideoOverlayCanvas();
    const overlayBlob = await new Promise(res => overlayCanvas.toBlob(res, 'image/png'));

    await ffmpeg.writeFile('input.mp4', await fetchFile(videoFile));
    await ffmpeg.writeFile('overlay.png', await fetchFile(overlayBlob));

    const cw = Math.round(CUTOUT.w), ch = Math.round(CUTOUT.h);
    const tw = Math.round(CANVAS_W), th = Math.round(CANVAS_H);
    const ox = Math.round(CUTOUT.x), oy = Math.round(CUTOUT.y);
    const filter = `[0:v]scale=${cw}:${ch},pad=${tw}:${th}:${ox}:${oy}:color=${BORDER_COLOR.replace('#','0x')}[padded];[padded][1:v]overlay=0:0:format=auto[out]`;

    progressLabel.textContent = 'Rendering final video...';
    await ffmpeg.exec([
      '-i', 'input.mp4',
      '-i', 'overlay.png',
      '-filter_complex', filter,
      '-map', '[out]',
      '-map', '0:a?',
      '-c:v', 'libx264',
      '-preset', 'ultrafast',
      '-pix_fmt', 'yuv420p',
      '-c:a', 'aac',
      '-shortest',
      'output.mp4'
    ]);

    const data = await ffmpeg.readFile('output.mp4');
    const outBlob = new Blob([data.buffer], { type: 'video/mp4' });
    const outUrl = URL.createObjectURL(outBlob);

    const resultVideoEl = document.getElementById('resultVideo');
    resultVideoEl.src = outUrl;
    resultVideoEl.style.display = '';
    document.getElementById('resultCanvas').style.display = 'none';
    currentVideoBlob = outBlob;

    progressWrap.classList.remove('active');
    document.getElementById('createBtn').disabled = false;
    step2.classList.remove('active');
    step3.classList.add('active');
  } catch (err) {
    console.error(err);
    progressLabel.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
    document.getElementById('createBtn').disabled = false;
  }
}

let currentVideoBlob = null;

document.getElementById('saveBtn').addEventListener('click', async () => {
  let blob, filename, type;
  if (mode === 'photo') {
    if (!currentCanvas) return;
    blob = await new Promise(res => currentCanvas.toBlob(res, 'image/png'));
    filename = 'chavivim-poster.png';
    type = 'image/png';
  } else {
    if (!currentVideoBlob) return;
    blob = currentVideoBlob;
    filename = 'chavivim-poster.mp4';
    type = 'video/mp4';
  }

  const file = new File([blob], filename, { type });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file] });
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }

  const isDesktop = !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const url = URL.createObjectURL(blob);
  if (isDesktop) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  } else {
    window.open(url, '_blank');
  }
});
</script>
